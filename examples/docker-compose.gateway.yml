services:
  skill-sync-gateway:
    build:
      context: ..
      dockerfile: Dockerfile
    image: skill-sync-sidecar:local
    container_name: skill-sync-gateway
    restart: unless-stopped
    ports:
      - "8765:8765"
    environment:
      SKILL_SYNC_WEBDAV_USER: "${SKILL_SYNC_WEBDAV_USER:?set SKILL_SYNC_WEBDAV_USER}"
      SKILL_SYNC_WEBDAV_PASSWORD: "${SKILL_SYNC_WEBDAV_PASSWORD:?set SKILL_SYNC_WEBDAV_PASSWORD}"
    volumes:
      - skill-sync-gateway-cache:/cache
    command:
      - gateway
      - --remote
      - "${SKILL_SYNC_WEBDAV_URL:?set SKILL_SYNC_WEBDAV_URL}"
      - --prefix
      - "${SKILL_SYNC_GATEWAY_PREFIX:-skill-sync-sidecar-dev/current-mac}"
      - --cache-dir
      - /cache/current
      - --refresh-interval-seconds
      - "${SKILL_SYNC_GATEWAY_REFRESH_INTERVAL_SECONDS:-60}"
      - --host
      - 0.0.0.0
      - --port
      - "8765"
      - --remote-peer-status
      - "${SKILL_SYNC_GATEWAY_REMOTE_PEER_STATUS_MAC:-mac=skill-sync-sidecar-peer-status/mac.json}"
      - --remote-peer-status
      - "${SKILL_SYNC_GATEWAY_REMOTE_PEER_STATUS_OPENCLAW:-oc-vps=skill-sync-sidecar-peer-status/oc-vps.json}"

  skill-sync-monitor:
    build:
      context: ..
      dockerfile: Dockerfile
    image: skill-sync-sidecar:local
    container_name: skill-sync-monitor
    restart: unless-stopped
    depends_on:
      - skill-sync-gateway
    volumes:
      - skill-sync-gateway-cache:/cache
    command:
      - monitor-loop
      - --url
      - "${SKILL_SYNC_MONITOR_URL:-http://skill-sync-gateway:8765/api/summary}"
      - --out-dir
      - /cache/monitor
      - --interval-seconds
      - "${SKILL_SYNC_MONITOR_INTERVAL_SECONDS:-300}"
      - --timeout-seconds
      - "${SKILL_SYNC_MONITOR_TIMEOUT_SECONDS:-20}"
      - --stale-after-seconds
      - "${SKILL_SYNC_MONITOR_STALE_AFTER_SECONDS:-1800}"

volumes:
  skill-sync-gateway-cache:
